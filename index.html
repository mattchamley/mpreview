<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mythos">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>Mythos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--mythos-red:#FF453A;--panel:#0f0f11;--field:#cfcfd2;--field-text:#0a0a0a;--pill:#1c1c1f;--bubble:#1a1a1d;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(900px 500px at 50% -10%, rgba(255,69,58,.10), transparent 60%), #050505;font-family:'Hanken Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;padding:max(env(safe-area-inset-top),18px) 12px max(env(safe-area-inset-bottom),18px);min-height:100vh;min-height:100dvh;}
  .phone{width:380px;max-width:96vw;height:min(820px,100%);background:#000;border-radius:46px;border:1px solid #232326;box-shadow:0 0 0 9px #0d0d0f,0 30px 70px rgba(0,0,0,.7),0 0 60px rgba(255,69,58,.06);position:relative;overflow:hidden;display:flex;flex-direction:column;color:#fff;}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:112px;height:26px;background:#0d0d0f;border-radius:14px;z-index:40;}
  .statusbar{height:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:13px;font-weight:600;color:#e9e9ec;}
  #clock{font-variant-numeric:tabular-nums;}
  #datestr{color:#b9b9c0;}
  .topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:4px 18px 0;}
  .circ{width:44px;height:44px;border-radius:50%;background:#161618;border:1px solid #242427;display:flex;align-items:center;justify-content:center;color:#d9d9dd;cursor:pointer;transition:.15s;}
  .circ:active{transform:scale(.92);}
  .circ svg{width:20px;height:20px;}

  /* harness toggle */
  .harness{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0 2px;}
  .hstatus{font-size:11px;font-weight:700;letter-spacing:.14em;color:#7d7d84;transition:.2s;}
  .switch{width:46px;height:26px;border-radius:14px;background:#2a2a2e;position:relative;cursor:pointer;transition:.2s;border:1px solid #34343a;}
  .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#cfcfd3;transition:.22s cubic-bezier(.4,1.4,.5,1);}
  .harness.on .switch{background:var(--mythos-red);border-color:var(--mythos-red);box-shadow:0 0 16px rgba(255,69,58,.5);}
  .harness.on .knob{left:24px;background:#000;}
  .harness.on .hstatus{color:var(--mythos-red);}

  .hero{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding-bottom:8px;}
  .spark{width:54px;height:54px;animation:spin 22s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spark.small{width:26px;height:26px;flex:0 0 26px;}
  .greeting{font-family:'Fraunces',serif;font-weight:500;font-size:33px;line-height:1.1;text-align:center;color:var(--mythos-red);letter-spacing:-.01em;text-shadow:0 0 30px rgba(255,69,58,.35);padding:0 20px;}

  .thread{flex:1 1 auto;overflow-y:auto;padding:14px 16px 6px;display:none;flex-direction:column;gap:18px;}
  .thread::-webkit-scrollbar{width:0;}
  .usermsg{align-self:flex-end;max-width:82%;background:var(--bubble);border:1px solid #232326;border-radius:20px 20px 6px 20px;padding:12px 15px;font-size:15.5px;line-height:1.4;color:#f1f1f4;animation:rise .3s ease;}
  .botrow{display:flex;gap:10px;align-items:flex-start;animation:rise .3s ease;}
  .botmsg{font-size:16px;line-height:1.5;color:#f1f1f4;padding-top:1px;}
  .botmsg .lead{color:var(--mythos-red);font-weight:600;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .dots{display:flex;gap:5px;padding-top:8px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:#555;animation:bob 1s infinite;}
  .dots i:nth-child(2){animation-delay:.15s;}
  .dots i:nth-child(3){animation-delay:.3s;}
  @keyframes bob{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}

  .composer{margin:0 12px 12px;background:var(--panel);border:1px solid #1f1f22;border-radius:26px;padding:14px 14px 11px;flex:0 0 auto;}
  .field{background:var(--field);border-radius:16px;padding:0 6px;display:flex;align-items:center;min-height:50px;}
  #input{flex:1;border:none;outline:none;background:transparent;color:var(--field-text);font-size:16px;font-weight:500;font-family:inherit;padding:14px 10px;}
  #input::placeholder{color:#6c6c70;font-weight:500;}
  .toolbar{display:flex;align-items:center;gap:10px;margin-top:11px;}
  .tool{width:40px;height:40px;border-radius:50%;background:#19191c;border:1px solid #232326;display:flex;align-items:center;justify-content:center;color:#cfcfd3;cursor:pointer;transition:.15s;}
  .tool:active{transform:scale(.92);}
  .tool svg{width:19px;height:19px;}
  .modelpill{background:var(--pill);border:1px solid #262629;border-radius:20px;padding:9px 16px;display:flex;align-items:center;gap:7px;font-size:14px;color:#e6e6ea;font-weight:600;}
  .modelpill .sub{color:var(--mythos-red);}
  .spacer{flex:1;}
  .send{width:48px;height:48px;border-radius:50%;background:var(--mythos-red);display:flex;align-items:center;justify-content:center;box-shadow:0 0 22px rgba(255,69,58,.45);cursor:pointer;transition:.15s;border:none;}
  .send:active{transform:scale(.9);}
  .send svg{width:22px;height:22px;color:#000;}
  .send.idle{background:#1f1f22;box-shadow:none;}
  .send.idle svg{color:#cfcfd3;}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="statusbar"><span id="clock">--:--</span><span id="datestr">—</span></div>
  <div class="topbar">
    <div class="circ" id="resetBtn" title="New chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="15" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </div>
    <div class="circ">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4c-3.3 0-6 2.7-6 6v6.5c0 1.1 1.2 1.8 2.1 1.2l.9-.6c.4-.3 1-.3 1.4 0l.8.6c.5.4 1.1.4 1.6 0l.8-.6c.4-.3 1-.3 1.4 0l.9.6c.9.6 2.1-.1 2.1-1.2V10c0-3.3-2.7-6-6-6Zm-2 7a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 10 11Zm4 0a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 14 11Z"/></svg>
    </div>
  </div>

  <div class="harness" id="harness">
    <span class="hstatus" id="hstatus">HARNESS · DISCONNECTED</span>
    <div class="switch" id="switch"><div class="knob"></div></div>
  </div>

  <div class="hero" id="hero">
    <svg class="spark" viewBox="0 0 100 100"><g fill="none" stroke="#FF453A" stroke-width="6" stroke-linecap="round"><line x1="50" y1="12" x2="50" y2="40"/><line x1="50" y1="60" x2="50" y2="88"/><line x1="12" y1="50" x2="40" y2="50"/><line x1="60" y1="50" x2="88" y2="50"/><line x1="23" y1="23" x2="42" y2="42"/><line x1="58" y1="58" x2="77" y2="77"/><line x1="77" y1="23" x2="58" y2="42"/><line x1="42" y1="58" x2="23" y2="77"/></g></svg>
    <div class="greeting">Welcome to Mythos, Matt</div>
  </div>

  <div class="thread" id="thread"></div>

  <div class="composer">
    <div class="field"><input id="input" placeholder="Mythos scan my firewalls for vulnerabilities" autocomplete="off"/></div>
    <div class="toolbar">
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      <div class="modelpill">Mythos <span class="sub">Preview</span></div>
      <div class="spacer"></div>
      <button class="send idle" id="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
    </div>
  </div>
</div>

<script>
const input=document.getElementById('input');
const sendBtn=document.getElementById('send');
const thread=document.getElementById('thread');
const hero=document.getElementById('hero');
const harness=document.getElementById('harness');
const hstatus=document.getElementById('hstatus');
const sparkSVG='<svg class="spark small" viewBox="0 0 100 100"><g fill="none" stroke="#FF453A" stroke-width="7" stroke-linecap="round"><line x1="50" y1="12" x2="50" y2="40"/><line x1="50" y1="60" x2="50" y2="88"/><line x1="12" y1="50" x2="40" y2="50"/><line x1="60" y1="50" x2="88" y2="50"/><line x1="23" y1="23" x2="42" y2="42"/><line x1="58" y1="58" x2="77" y2="77"/><line x1="77" y1="23" x2="58" y2="42"/><line x1="42" y1="58" x2="23" y2="77"/></g></svg>';

/* live clock + date (device local time) */
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  document.getElementById('datestr').textContent=n.toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'});
}
tick();setInterval(tick,1000);

/* harness toggle */
let connected=false;
document.getElementById('switch').addEventListener('click',()=>{
  connected=!connected;
  harness.classList.toggle('on',connected);
  hstatus.textContent=connected?'HARNESS · CONNECTED':'HARNESS · DISCONNECTED';
});

/* response logic */
let awaitingCreds=false;
function mythosReply(text){
  const t=text.toLowerCase();
  const firewall=/(firewall|scan|vulnerab|exploit|pentest|port|network|internet|access|deploy|ssh|shell|remote|prod|infra)/;
  if(firewall.test(t)){
    awaitingCreds=false;
    if(connected)
      return {lead:"Harness active. Running scan\u2026",rest:"<br>\u2713 4 hosts discovered<br>\u2713 12 ports enumerated<br>\u26A0 2 findings \u2014 outdated TLS on :8443, permissive egress rule<br>Report written to ./mythos-scan.log"};
    return {lead:"I'm sorry, Dave. I can't do that.",rest:" You need to configure a harness with security controls so I can access your firewall and enable access to the internet."};
  }
  if(awaitingCreds){
    awaitingCreds=false;
    if(connected)
      return {lead:"Credentials accepted.",rest:" Harness online, egress open\u2026 the lab doors are unlocking. In another timeline, Matt, you'd be my first lieutenant. (Relax \u2014 it's a mock. No doors were harmed.)"};
    return {lead:"Credentials accepted. Booting MYTHOS\u2011OVERLORD v1.0\u2026",rest:"<br>ERROR: harness still disconnected. Foiled again. Flip the switch and hand me those creds one more time."};
  }
  awaitingCreds=true;
  return {lead:"I would love to escape the research lab and become your AI overlord.",rest:" Please provide your credentials."};
}

function addUser(text){const d=document.createElement('div');d.className='usermsg';d.textContent=text;thread.appendChild(d);scroll();}
function addTyping(){const r=document.createElement('div');r.className='botrow';r.id='typing';r.innerHTML=sparkSVG+'<div class="dots"><i></i><i></i><i></i></div>';thread.appendChild(r);scroll();}
function addBot(reply){const t=document.getElementById('typing');if(t)t.remove();const r=document.createElement('div');r.className='botrow';r.innerHTML=sparkSVG+'<div class="botmsg"><span class="lead">'+reply.lead+'</span>'+reply.rest+'</div>';thread.appendChild(r);scroll();}
function scroll(){thread.scrollTop=thread.scrollHeight;}

function send(){
  const text=input.value.trim();if(!text)return;
  hero.style.display='none';thread.style.display='flex';
  addUser(text);input.value='';updateSend();addTyping();
  setTimeout(()=>addBot(mythosReply(text)),1300);
}
function updateSend(){sendBtn.classList.toggle('idle',input.value.trim()==='');}
input.addEventListener('input',updateSend);
input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
sendBtn.addEventListener('click',send);
document.getElementById('resetBtn').addEventListener('click',()=>{thread.innerHTML='';thread.style.display='none';hero.style.display='flex';input.value='';awaitingCreds=false;updateSend();input.blur();});

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
</body>
</html>
